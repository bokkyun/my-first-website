<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bokkyun's page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #888; margin-bottom: 24px; }
    p { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요, bokkyun입니다</h1>
    <p class="subtitle">나의 첫 번째 웹사이트</p>
    <p>웹 개발을 배우며 만든 첫 번째 페이지입니다.<br>앞으로 멋진 것들을 만들어 나갈 예정입니다!</p>
    <a class="btn" href="https://github.com/bokkyun" target="_blank">GitHub 방문하기</a>
  </div>
</body>
</html>
