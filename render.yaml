services:
  - type: web
    name: teamsync-server
    env: node
    rootDir: lecture1/TeamSync/server
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_VERSION
        value: 20
